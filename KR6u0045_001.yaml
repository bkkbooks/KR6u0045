body:
  text: 爾時地藏菩薩住在南方琉璃世界以淨天眼觀地獄之中受苦衆生鐵碓搗鐵磨磨鐵犁耕鐵鋸解鑊湯湧沸猛火旦天飢則吞熱鐵丸渴飲銅汁受諸苦惱無有休息地藏菩薩不忍見之即從南方來到地獄中與閻羅王共同一處別床而座有四種因緣一者恐閻羅王斷罪不憑二者恐文案交錯三者未合死四者受罪了出地獄池邊若有善男子善女人造地藏菩薩像寫地藏菩薩經及念地藏菩薩名此人定得往生西方極樂世界從一佛國至一佛國從一天堂至一天堂若有人造地藏菩薩像寫地藏菩薩經及念地藏菩薩名此人定得往生西方極樂世界此人捨命之日地藏菩薩親自來迎常得與地藏菩薩共同一處聞佛所説皆大歡喜信受奉行
